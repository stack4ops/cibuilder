name: cibuilder

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 9 * * 1'
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || '' }}
  CIBUILD_CI_TOKEN: ${{ secrets.CIBUILD_CI_TOKEN || '' }}
  CIBUILD_BASE_REGISTRY_PASS: ${{ secrets.CIBUILD_BASE_REGISTRY_PASS  || '' }}
  CIBUILD_TARGET_REGISTRY_PASS: ${{ secrets.CIBUILD_TARGET_REGISTRY_PASS  || '' }}
  CIBUILD_BUILD_BUILDKIT_CLIENT_KEY: ${{ secrets.CIBUILD_BUILD_BUILDKIT_CLIENT_KEY  || '' }}
  CIBUILD_BUILD_BUILDKIT_SERVICE_ACCOUNT: ${{ secrets.CIBUILD_BUILD_BUILDKIT_SERVICE_ACCOUNT  || '' }}
  CIBUILD_TEST_SERVICE_ACCOUNT: ${{ secrets.CIBUILD_TEST_SERVICE_ACCOUNT  || '' }}
  CIBUILD_RELEASE_COSIGN_PRIVATE_KEY: ${{ secrets.CIBUILD_RELEASE_COSIGN_PRIVATE_KEY  || '' }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v5
      - uses: stack4ops/actions-cibuilder@v1
        with:
          run_cmd: check
          bin_ref: main

  build:
    needs: check
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: stack4ops/actions-cibuilder@v1
        with:
          run_cmd: build
          bin_ref: main

  test:
    needs: build
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5
      - uses: stack4ops/actions-cibuilder-dind@v1
        with:
          run_cmd: test
          bin_ref: main
    
  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: stack4ops/actions-cibuilder@v1
        with:
          run_cmd: release
          bin_ref: main
      - name: Update latest tag
        run: |
          git tag -f ${{ github.ref_name }}-latest
          git push origin ${{ github.ref_name }} --force
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-latest
          name: ${{ github.ref_name }} latest
          prerelease: true
          make_latest: false
          generate_release_notes: false
          files: |
            ${{ runner.temp }}/cibuild-output/sbom-linux-amd64.spdx.json
            ${{ runner.temp }}/cibuild-output/sbom-linux-arm64.spdx.json
            ${{ runner.temp }}/cibuild-output/provenance-linux-amd64.slsa.json
            ${{ runner.temp }}/cibuild-output/provenance-linux-arm64.slsa.json
            ${{ runner.temp }}/cibuild-output/digests.json
            ${{ runner.temp }}/cibuild-output/cert.json

